<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/entdecken">{{ appName }}</a>

    <nav class="nav-links">
      <a routerLink="/entdecken" routerLinkActive="active">Entdecken</a>
      @if (isLoggedIn()) {
        <a routerLink="/watchlist" routerLinkActive="active">Meine Watchlist</a>
      }
    </nav>

    <div class="auth-actions">
      @if (isLoggedIn()) {
        <span class="welcome">Hi, {{ currentUser()?.name }}</span>
        <button type="button" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a class="register" routerLink="/register" routerLinkActive="active">Registrieren</a>
      }
    </div>
  </header>

  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
</div>
